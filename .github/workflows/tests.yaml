name: Usability test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # <min> <hr> <day> <mth> <weekday>
    - cron:  '0 0 1 * *'
  workflow_dispatch:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  container_test:
    name: Docker build test
    runs-on: ubuntu-22.04
    steps:
      - name: ⏹️ Cancel previous runs
        uses: pierreraffa/cancel-previous-runs-action@1.11
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          ref: 'artifact'
      - name: 🌲 Environment check
        run: ls -l
      - name: ⚫ Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: 🛠️ Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true

  exec_test:
    name: Runtime test
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6.0.2
      - name: ⚙️ Environment setup
        run: sudo apt update -y && sudo apt install -y build-essential git bc software-properties-common
      - name: ✴️ Run small test
        run: make small
